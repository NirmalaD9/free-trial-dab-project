resources:
  jobs:
    auto_pipeline_job:
      name: auto_pipeline_job_${bundle.target}

      schedule:
        quartz_cron_expression: "0 */30 * * * ?"
        timezone_id: Asia/Kolkata
        pause_status: UNPAUSED

      tasks:
        - task_key: run_job_notebook
          notebook_task:
            notebook_path: ../notebooks/job_notebook.py
            base_parameters:
              target: ${bundle.target}